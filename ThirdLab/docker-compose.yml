version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine 
    container_name: thirdlab_db
    restart: no 
    
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ThirdLabDb
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: